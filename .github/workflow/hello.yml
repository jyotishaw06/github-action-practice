# workflow (No indentation required for naming the workflow)
name: Hello
# on tells when the workflow should run (Give indentation by tab)
on:
  workflow-dispatch:


# Jobs tells the worflow should be , there can be one or more than one jobs , hence we write jobs 
# jobs is an object so needs indentation 
jobs: 
  #1st jobs (give indentation)
  say-hello:
    # Create an Ephermal Container with Ubuntu running
    run-on: ubuntu-latest
  steps:
    - name: say hello to everyone
      run: echo "Hello Dosto"
      
# Steps
# should be inside the jobs

# Actions
# Should be inside the Steps
